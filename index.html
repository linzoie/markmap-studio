<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
  <title>Markmap Studio</title>
  <meta name="description" content="貼上 Markdown，即時繪製成可互動的心智圖。可下載 HTML、SVG、PNG。完全在瀏覽器執行，不上傳任何內容。" />
  <meta name="color-scheme" content="light dark" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <h1 class="brand">Markmap Studio</h1>
      <span class="brand-sub">Markdown → 心智圖</span>
    </div>
    <nav class="toolbar">
      <input type="file" id="file-input" accept=".md,.markdown,.txt,.text" hidden />
      <button id="btn-upload"     title="從檔案載入 Markdown">Upload</button>
      <button id="btn-sample"     title="載入示範內容">Sample</button>
      <button id="btn-copy"       title="複製目前 Markdown">Copy MD</button>
      <span class="sep"></span>
      <button id="btn-html"       title="下載互動 HTML">HTML</button>
      <button id="btn-svg"        title="下載 SVG 向量圖">SVG</button>
      <button id="btn-png"        title="下載 PNG 圖片（目前畫面）">PNG</button>
      <button id="btn-jpg"        title="下載 JPG 圖片（目前畫面）">JPG</button>
      <span class="sep"></span>
      <button id="btn-share"      title="複製可分享的連結">Share</button>
      <button id="btn-theme"      title="切換深色模式" aria-label="theme">🌓</button>
    </nav>
  </header>
  <main id="app">
    <section id="editor-pane" aria-label="Markdown editor"></section>
    <div id="splitter" role="separator" aria-orientation="vertical" tabindex="0"></div>
    <section id="preview-pane" aria-label="Mindmap preview">
      <svg id="mindmap"></svg>
    </section>
  </main>
  <div id="toast-host" aria-live="polite"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
